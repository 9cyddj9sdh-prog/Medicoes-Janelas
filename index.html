<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medições de Caixilharia</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root {
    --primary-color: #007bff;
    --secondary-color: #28a745;
    --neutral-color: #6c757d;
    --dark-color: #343a40;
    --light-bg: #f8f9fa;
    --border-color: #dee2e6;
    --input-border: #ced4da;
    --focus-shadow: rgba(0, 123, 255, 0.25);
    --border-radius: 0.375rem;
    --spacing-sm: 0.5rem;
    --spacing-md: 1rem;
    --spacing-lg: 1.5rem;
}

body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--light-bg);
    padding: var(--spacing-md);
    margin: 0;
    color: var(--dark-color);
}

.container {
    background: white;
    padding: var(--spacing-lg);
    border-radius: var(--border-radius);
    box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
    max-width: 700px;
    margin: var(--spacing-lg) auto;
}

h1 {
    color: var(--dark-color);
    text-align: center;
    margin-bottom: var(--spacing-lg);
}

label {
    display: block;
    margin-bottom: var(--spacing-sm);
    font-weight: 600;
}

input[type="text"],
input[type="date"],
input[type="number"],
select,
textarea {
    width: 100%;
    padding: var(--spacing-sm) var(--spacing-md);
    margin-bottom: var(--spacing-md);
    border: 1px solid var(--input-border);
    border-radius: var(--border-radius);
    box-sizing: border-box;
    font-size: 1rem;
}

textarea {
    resize: vertical;
    min-height: 80px;
}

.row {
    display: flex;
    gap: var(--spacing-md);
    margin-bottom: var(--spacing-md);
}

.row > div {
    flex: 1;
}

@media (max-width: 600px) {
    .row {
        flex-direction: column;
        gap: 0;
    }
}

.image-preview-card {
    border: 1px solid var(--border-color);
    background-color: var(--light-bg);
    border-radius: var(--border-radius);
    padding: var(--spacing-md);
    margin: var(--spacing-md) 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.image-preview-card img {
    max-width: 100px;
    max-height: 100px;
    transition: transform 0.3s ease-in-out;
}

.image-orientation-info {
    font-size: 0.75rem;
    color: var(--neutral-color);
}

.button-group {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.button-group button {
    flex: 1;
}

@media (max-width: 768px) {
    .button-group {
        flex-direction: column;
    }

    .button-group button {
        width: 100%;
    }
}

button {
    padding: var(--spacing-sm) var(--spacing-lg);
    border: none;
    border-radius: var(--border-radius);
    color: white;
    font-size: 1rem;
    cursor: pointer;
}

button.btn-secondary {
    background-color: var(--neutral-color);
}

button.btn-primary {
    background-color: var(--primary-color);
}

button.btn-success {
    background-color: var(--secondary-color);
}

.image-preview-card .btn-icon {
    background: var(--dark-color);
    padding: 0.25rem 0.5rem;
    font-size: 0.75rem;
    margin-top: var(--spacing-sm);
}

</style>
</head>

<body>

<div class="container">

<h1>Medições de Caixilharia</h1>

<form id="measurementForm">

<label for="clientName">Cliente</label>
<input type="text" id="clientName" required>

<label for="clientAddress">Morada</label>
<input type="text" id="clientAddress" required>

<div class="row">
<div>
<label for="measurementDate">Data</label>
<input type="date" id="measurementDate" required>
</div>

<div>
<label for="materialType">Material</label>
<select id="materialType">
<option value="Alumínio">Alumínio</option>
<option value="PVC">PVC</option>
</select>
</div>
</div>

<hr>

<label for="itemCode">Código do Item</label>
<input type="text" id="itemCode" required>

<div class="row">
<div>
<label for="itemWidth">Largura (mm)</label>
<input type="number" id="itemWidth" required>
</div>

<div>
<label for="itemHeight">Altura (mm)</label>
<input type="number" id="itemHeight" required>
</div>
</div>

<label for="windowDesign">Desenho do Vão</label>

<select id="windowDesign" onchange="updateImagePreview(this.value);">

<option value="">Selecione...</option>

<option value="JanelaAbrir1Folha.PNG">Janela Abrir 1 Folha</option>
<option value="JanelaAbrir2Folhas.PNG">Janela Abrir 2 Folhas</option>
<option value="Basculante.jpg">Basculante</option>
<option value="JanelaCorrer2Folhas.PNG">Janela Correr 2 Folhas</option>

</select>

<div class="image-preview-card">

<img id="imgPreview" src="" style="display:none;">

<button type="button"
onclick="toggleImageInversion()"
class="btn-icon">

Inverter Imagem

</button>

<div class="image-orientation-info">
Todas as vistas são por dentro
</div>

</div>

<label for="glassPanelType">Vidro / Painel</label>
<input type="text" id="glassPanelType">

<label for="observations">Observações</label>
<textarea id="observations"></textarea>

<label for="finishes">Remates</label>
<textarea id="finishes"></textarea>

<div class="button-group">

<button type="button"
onclick="clearForm()"
class="btn-secondary">

Limpar

</button>

<button type="button"
onclick="addMeasurement()"
class="btn-primary">

Adicionar Item

</button>

<button type="button"
onclick="generatePdf()"
class="btn-success">

Gerar PDF

</button>

</div>

</form>
</div>

<script>

let measurements = [];

let isImageInverted = false;

const imageCache = {};

const elements = {

    clientName: document.getElementById('clientName'),
    clientAddress: document.getElementById('clientAddress'),
    measurementDate: document.getElementById('measurementDate'),

    itemCode: document.getElementById('itemCode'),
    itemWidth: document.getElementById('itemWidth'),
    itemHeight: document.getElementById('itemHeight'),

    windowDesign: document.getElementById('windowDesign'),

    imgPreview: document.getElementById('imgPreview'),

    glassPanelType: document.getElementById('glassPanelType'),

    observations: document.getElementById('observations'),

    finishes: document.getElementById('finishes'),

    measurementForm: document.getElementById('measurementForm')
};

function updateImagePreview(imageFileName) {

    if (imageFileName) {

        elements.imgPreview.src = imageFileName;

        elements.imgPreview.style.display = 'block';

        isImageInverted = false;

        elements.imgPreview.style.transform = "scaleX(1)";

    } else {

        elements.imgPreview.style.display = 'none';
    }
}

function toggleImageInversion() {

    isImageInverted = !isImageInverted;

    elements.imgPreview.style.transform =
        isImageInverted
        ? "scaleX(-1)"
        : "scaleX(1)";
}

async function getImageBase64(url) {

    if (!url) return null;

    if (imageCache[url]) {
        return imageCache[url];
    }

    return new Promise((resolve) => {

        const img = new Image();

        img.onload = function () {

            const canvas =
                document.createElement("canvas");

            canvas.width = img.width;
            canvas.height = img.height;

            const ctx =
                canvas.getContext("2d");

            ctx.drawImage(img, 0, 0);

            const base64 =
                canvas.toDataURL("image/jpeg");

            imageCache[url] = base64;

            resolve(base64);
        };

        img.src = url;
    });
}

async function getFormData() {

    return {

        clientName:
            elements.clientName.value,

        clientAddress:
            elements.clientAddress.value,

        measurementDate:
            elements.measurementDate.value,

        itemCode:
            elements.itemCode.value,

        itemWidth:
            elements.itemWidth.value,

        itemHeight:
            elements.itemHeight.value,

        windowDesign:
            elements.windowDesign.value,

        glassPanelType:
            elements.glassPanelType.value,

        observations:
            elements.observations.value,

        finishes:
            elements.finishes.value,

        imageData:
            await getImageBase64(
                elements.windowDesign.value
            )
    };
}

async function addMeasurement() {

    const data = await getFormData();

    measurements.push(data);

    clearForm();

    alert("Item adicionado.");
}

function clearForm() {

    elements.itemCode.value = '';

    elements.itemWidth.value = '';

    elements.itemHeight.value = '';

    elements.windowDesign.value = '';

    elements.glassPanelType.value = '';

    elements.observations.value = '';

    elements.finishes.value = '';

    updateImagePreview('');
}

async function generatePdf() {

    if (
        elements.itemCode.value ||
        elements.itemWidth.value
    ) {

        const data = await getFormData();

        measurements.push(data);
    }

    if (measurements.length === 0) {
        alert("Nenhum item.");
        return;
    }

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF({
        orientation: "portrait",
        unit: "mm",
        format: "a4"
    });

    const PAGE_MARGIN_X = 8;

    const ITEM_START_Y = 38;

    const ITEM_BOX_WIDTH = 93;

    const ITEM_BOX_HEIGHT = 78;

    const ITEM_SPACING_X = 4;

    const ITEM_SPACING_Y = 4;

    const ITEMS_PER_ROW = 2;

    const ITEMS_PER_PAGE = 6;

    let currentCol = 0;

    let currentRow = 0;

    // HEADER
    doc.setFontSize(15);

    doc.setFont(undefined, "bold");

    doc.text(
        "Medições de Caixilharia",
        105,
        16,
        { align: "center" }
    );

    doc.setFontSize(8);

    doc.setFont(undefined, "normal");

    doc.text(
        `Cliente: ${measurements[0].clientName}`,
        PAGE_MARGIN_X,
        24
    );

    doc.text(
        `Morada: ${measurements[0].clientAddress}`,
        PAGE_MARGIN_X,
        29
    );

    doc.text(
        `Data: ${measurements[0].measurementDate}`,
        PAGE_MARGIN_X,
        34
    );

    doc.line(8, 36, 202, 36);

    // ITEMS
    for (let i = 0; i < measurements.length; i++) {

        const item = measurements[i];

        if (
            i > 0 &&
            i % ITEMS_PER_PAGE === 0
        ) {

            doc.addPage();

            currentCol = 0;
            currentRow = 0;
        }

        const currentX =
            PAGE_MARGIN_X +
            (currentCol *
            (ITEM_BOX_WIDTH + ITEM_SPACING_X));

        const currentY =
            ITEM_START_Y +
            (currentRow *
            (ITEM_BOX_HEIGHT + ITEM_SPACING_Y));

        // BOX
        doc.roundedRect(
            currentX,
            currentY,
            ITEM_BOX_WIDTH,
            ITEM_BOX_HEIGHT,
            2,
            2
        );

        // TITLE
        doc.setFontSize(9);

        doc.setFont(undefined, "bold");

        doc.text(
            `VÃO ${i + 1}`,
            currentX + 3,
            currentY + 6
        );

        // LEFT
        doc.setFontSize(7);

        doc.setFont(undefined, "normal");

        let y = currentY + 12;

        const leftX = currentX + 3;

        doc.text(
            `Cod: ${item.itemCode}`,
            leftX,
            y
        );

        y += 4;

        doc.text(
            `L: ${item.itemWidth} mm`,
            leftX,
            y
        );

        y += 4;

        doc.text(
            `A: ${item.itemHeight} mm`,
            leftX,
            y
        );

        y += 4;

        doc.text(
            `Vidro: ${item.glassPanelType || "-"}`,
            leftX,
            y
        );

        y += 6;

        const obs =
            doc.splitTextToSize(
                `Obs: ${item.observations || "-"}`,
                40
            );

        doc.text(
            obs.slice(0, 2),
            leftX,
            y
        );

        // IMAGE
        if (item.imageData) {

            const imageX =
                currentX + 58;

            const imageY =
                currentY + 18;

            doc.addImage(
                item.imageData,
                "JPEG",
                imageX,
                imageY,
                26,
                22
            );

            doc.setFontSize(5);

            doc.text(
                "Vista interior",
                imageX + 13,
                imageY + 26,
                { align: "center" }
            );
        }

        currentCol++;

        if (
            currentCol === ITEMS_PER_ROW
        ) {

            currentCol = 0;

            currentRow++;
        }
    }

    // FOOTER
    doc.setFontSize(7);

    doc.text(
        "Documento técnico de medições",
        105,
        290,
        { align: "center" }
    );

    // IOS
    const isIOS =
        /iPad|iPhone|iPod/.test(
            navigator.userAgent
        );

    if (isIOS) {

        const pdfBlob =
            doc.output('blob');

        const pdfUrl =
            URL.createObjectURL(pdfBlob);

        window.open(pdfUrl, '_blank');

    } else {

        doc.save(
            `Medicoes_${measurements[0].clientName}.pdf`
        );
    }

    measurements = [];

    clearForm();

    alert("PDF gerado com sucesso!");
}

document.addEventListener('DOMContentLoaded', () => {

    const today =
        new Date()
        .toISOString()
        .split('T')[0];

    elements.measurementDate.value =
        today;
});

</script>

</body>
</html>
