<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Medições de Caixilharia</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* Estilos omitidos por brevidade (mesmos do original) */
  </style>
</head>
<body>
<div class="container">
  <h1>Medições de Caixilharia</h1>
  <form id="measurementForm">
    <!-- Campos do formulário (idem original) -->
    <!-- ... -->
    <div class="button-group">
      <button type="button" onclick="clearForm()" class="btn-secondary">Limpar</button>
      <button type="button" onclick="addMeasurement()" class="btn-primary">Adicionar Item</button>
      <button type="button" onclick="generatePdf()" class="btn-success">Finalizar e Gerar PDF</button>
    </div>
  </form>
</div>

<script>
  let measurements = [], isImageInverted = false, imageCache = {};
  const elements = {
    clientName: document.getElementById('clientName'),
    clientAddress: document.getElementById('clientAddress'),
    measurementDate: document.getElementById('measurementDate'),
    materialType: document.getElementById('materialType'),
    itemCode: document.getElementById('itemCode'),
    itemWidth: document.getElementById('itemWidth'),
    itemHeight: document.getElementById('itemHeight'),
    windowDesign: document.getElementById('windowDesign'),
    imgPreview: document.getElementById('imgPreview'),
    glassPanelType: document.getElementById('glassPanelType'),
    oscillationType: document.getElementById('oscillationType'),
    seriesType: document.getElementById('seriesType'),
    observations: document.getElementById('observations'),
    finishes: document.getElementById('finishes'),
    blindsIncluded: document.getElementById('blindsIncluded'),
    blindsFields: document.getElementById('blindsFields'),
    blindsWidth: document.getElementById('blindsWidth'),
    blindsHeight: document.getElementById('blindsHeight'),
    blindsColor: document.getElementById('blindsColor'),
    clientList: document.getElementById('clientList'),
    measurementForm: document.getElementById('measurementForm')
  };

  // Atualiza pré-visualização de imagem
  function updateImagePreview(imageFileName) {
    if (imageFileName) {
      elements.imgPreview.src = imageFileName;
      elements.imgPreview.style.display = 'block';
      isImageInverted = false;
      elements.imgPreview.style.transform = "scaleX(1)";
    } else {
      elements.imgPreview.src = '';
      elements.imgPreview.style.display = 'none';
    }
  }

  // Inverte imagem da pré-visualização horizontalmente
  function toggleImageInversion() {
    if (elements.imgPreview.src) {
      isImageInverted = !isImageInverted;
      elements.imgPreview.style.transform = isImageInverted ? "scaleX(-1)" : "scaleX(1)";
    }
  }

  // Carrega imagem Base64 no cache
  async function getImageBase64(url) {
    if (!url) return null;
    if (imageCache[url]) return imageCache[url];

    try {
      const img = new Image();
      img.crossOrigin = "Anonymous";
      img.src = url;
      await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });
      const canvas = document.createElement("canvas");
      canvas.width = img.width; canvas.height = img.height;
      canvas.getContext("2d").drawImage(img, 0, 0);
      const base64 = canvas.toDataURL("image/jpeg");
      imageCache[url] = base64;
      return base64;
    } catch (err) {
      console.error("Erro ao carregar imagem:", err);
      return null;
    }
  }

  // Inverte Base64 de imagem via canvas
  async function invertBase64Image(base64) {
    if (!base64) return null;
    return new Promise(res => {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement("canvas");
        canvas.width = this.width; canvas.height = this.height;
        const ctx = canvas.getContext("2d");
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(this, 0, 0);
        res(canvas.toDataURL("image/jpeg"));
      };
      img.src = base64;
    });
  }

  function toggleBlindsFields(value) {
    elements.blindsFields.style.display = (value === "Sim") ? 'block' : 'none';
    if (value === "Não") {
      elements.blindsWidth.value = '';
      elements.blindsHeight.value = '';
      elements.blindsColor.value = '';
    }
  }

  function clearForm() {
    elements.itemCode.value = '';
    elements.itemWidth.value = '';
    elements.itemHeight.value = '';
    elements.windowDesign.value = '';
    updateImagePreview('');
    elements.glassPanelType.value = '';
    elements.oscillationType.value = 'Sim';
    elements.seriesType.value = 'Térmica 70';
    elements.observations.value = '';
    elements.finishes.value = '';
    elements.blindsIncluded.value = 'Não';
    toggleBlindsFields('Não');
    elements.blindsWidth.value = '';
    elements.blindsHeight.value = '';
    elements.blindsColor.value = '';
    isImageInverted = false;
  }

  function validateForm() {
    return elements.measurementForm.checkValidity();
  }

  async function getFormData() {
    const formData = {
      clientName: elements.clientName.value.trim(),
      clientAddress: elements.clientAddress.value.trim(),
      measurementDate: elements.measurementDate.value,
      materialType: elements.materialType.value,
      itemCode: elements.itemCode.value.trim(),
      itemWidth: elements.itemWidth.value.trim(),
      itemHeight: elements.itemHeight.value.trim(),
      windowDesign: elements.windowDesign.value,
      glassPanelType: elements.glassPanelType.value.trim(),
      oscillationType: elements.oscillationType.value,
      seriesType: elements.seriesType.value,
      observations: elements.observations.value.trim(),
      finishes: elements.finishes.value.trim(),
      blindsIncluded: elements.blindsIncluded.value,
      blindsWidth: elements.blindsWidth.value.trim(),
      blindsHeight: elements.blindsHeight.value.trim(),
      blindsColor: elements.blindsColor.value.trim(),
      isImageInverted: isImageInverted
    };

    formData.imageData = await getImageBase64(formData.windowDesign);
    if (formData.isImageInverted && formData.imageData) {
      formData.imageData = await invertBase64Image(formData.imageData);
    }
    return formData;
  }

  async function addMeasurement() {
    if (!validateForm()) {
      alert("Por favor, preencha todos os campos obrigatórios.");
      elements.measurementForm.reportValidity();
      return;
    }
    const current = await getFormData();
    measurements.push(current);
    saveClientData();
    clearForm();
    alert("Item adicionado com sucesso!");
  }

  async function generatePdf() {
    // Adiciona último item se não salvo
    if ((elements.itemCode.value || elements.itemWidth.value || elements.itemHeight.value) && validateForm()) {
      measurements.push(await getFormData());
    }
    if (measurements.length === 0) {
      alert("Nenhum item adicionado para gerar o PDF.");
      return;
    }

    const { jsPDF } = window.jspdf;
    // Configurações PDF: A4 (210x297 mm), orientação retrato
    const doc = new jsPDF('p', 'mm', 'a4');  // mm e A4 garantidos【42†L174-L181】

    // Margens e layout
    const PAGE_MARGIN_X = 10;
    const PAGE_MARGIN_Y_TOP = 12;
    const PAGE_MARGIN_Y_HEADER_BOTTOM = 37;
    const ITEM_START_Y = 40;
    const ITEM_BOX_WIDTH = 90;
    const ITEM_BOX_HEIGHT = 80;
    const ITEM_SPACING_X = 5;
    const ITEM_SPACING_Y = 5;
    const ITEMS_PER_ROW = 2;
    const ITEMS_PER_PAGE = 6; // 2 colunas x 3 linhas

    let currentCol = 0, currentRow = 0;

    // Função para desenhar cabeçalho em cada página
    function drawPageHeader(pageDoc, data) {
      pageDoc.setFontSize(14);
      pageDoc.setFont(undefined, "bold");
      pageDoc.text("Medições de Caixilharia", pageDoc.internal.pageSize.getWidth() / 2, PAGE_MARGIN_Y_TOP, { align: "center" });
      pageDoc.setFont(undefined, "normal");
      pageDoc.setFontSize(9);
      pageDoc.text(`Cliente: ${data.clientName||"-"}`, PAGE_MARGIN_X, PAGE_MARGIN_Y_TOP+10);
      pageDoc.text(`Morada: ${data.clientAddress||"-"}`, PAGE_MARGIN_X, PAGE_MARGIN_Y_TOP+16);
      pageDoc.text(`Data: ${data.measurementDate||"-"}`, PAGE_MARGIN_X, PAGE_MARGIN_Y_TOP+22);
      pageDoc.setDrawColor(180);
      pageDoc.line(PAGE_MARGIN_X, PAGE_MARGIN_Y_HEADER_BOTTOM, pageDoc.internal.pageSize.getWidth()-PAGE_MARGIN_X, PAGE_MARGIN_Y_HEADER_BOTTOM);
    }

    // Desenha cabeçalho na primeira página
    drawPageHeader(doc, measurements[0]);

    // Desenha itens
    for (let i = 0; i < measurements.length; i++) {
      const item = measurements[i];
      // Nova página se necessário
      if (i > 0 && i % ITEMS_PER_PAGE === 0) {
        doc.addPage();
        currentCol = 0; currentRow = 0;
        drawPageHeader(doc, measurements[0]);
      }

      // Calcula posição do item
      const posX = PAGE_MARGIN_X + currentCol * (ITEM_BOX_WIDTH + ITEM_SPACING_X);
      const posY = ITEM_START_Y + currentRow * (ITEM_BOX_HEIGHT + ITEM_SPACING_Y);

      // Caixa do item
      doc.setDrawColor(150);
      doc.rect(posX, posY, ITEM_BOX_WIDTH, ITEM_BOX_HEIGHT);

      // Título do vão
      doc.setFontSize(10);
      doc.setFont(undefined, "bold");
      doc.text(`VÃO ${i+1}`, posX+3, posY+6);

      doc.setFont(undefined, "normal");
      doc.setFontSize(8);
      doc.text(`Cod: ${item.itemCode||"-"}`, posX+3, posY+12);

      const vaoName = item.windowDesign.replace(/\.(PNG|png|JPG|jpg|JPEG|jpeg)$/, '');
      doc.text(`Vão: ${vaoName}`, posX+3, posY+17);
      doc.text(`Vidro: ${item.glassPanelType||"-"}`, posX+3, posY+22);
      doc.text(`Osc: ${item.oscillationType}`, posX+3, posY+27);
      doc.text(`Série: ${item.seriesType}`, posX+3, posY+32);
      doc.text(`L: ${item.itemWidth || "-"} mm`, posX+3, posY+37);
      doc.text(`A: ${item.itemHeight || "-"} mm`, posX+3, posY+42);

      // Observações (até 3 linhas)
      const obsLines = doc.splitTextToSize(`Obs: ${item.observations||"-"}`, ITEM_BOX_WIDTH/2 - 5);
      doc.text(obsLines.slice(0,3), posX+3, posY+50);

      // Remates (até 2 linhas)
      const remLines = doc.splitTextToSize(`Remates: ${item.finishes||"-"}`, ITEM_BOX_WIDTH/2 - 5);
      doc.text(remLines.slice(0,2), posX+3, posY+65);

      // Imagem do vão
      if (item.imageData) {
        const img = new Image();
        img.src = item.imageData;
        // Calcula tamanho proporcional (max 30x25 mm)
        const maxW = 30, maxH = 25;
        let imgRatio = img.width / img.height;
        let imgW = maxW, imgH = maxW / imgRatio;
        if (imgH > maxH) {
          imgH = maxH;
          imgW = maxH * imgRatio;
        }
        const imgFormat = item.windowDesign.toLowerCase().includes(".png") ? "PNG" : "JPEG";
        doc.addImage(item.imageData, imgFormat, posX + ITEM_BOX_WIDTH/2 + 5, posY+10, imgW, imgH);
        // Legenda imagem
        doc.setFontSize(6);
        doc.text("Todas as vistas são por dentro", posX + ITEM_BOX_WIDTH/2 + 5, posY + 10 + imgH + 3);
        doc.setFontSize(8);
      }

      // Estores
      doc.text(`Estores: ${item.blindsIncluded}`, posX + ITEM_BOX_WIDTH/2 + 5, posY + 42);
      if (item.blindsIncluded === "Sim") {
        doc.text(`L: ${item.blindsWidth||"-"}`, posX + ITEM_BOX_WIDTH/2 + 5, posY + 47);
        doc.text(`A: ${item.blindsHeight||"-"}`, posX + ITEM_BOX_WIDTH/2 + 5, posY + 52);
        doc.text(`Cor: ${item.blindsColor||"-"}`, posX + ITEM_BOX_WIDTH/2 + 5, posY + 57);
      }

      // Atualiza coluna/linha para próximo item
      currentCol++;
      if (currentCol === ITEMS_PER_ROW) {
        currentCol = 0;
        currentRow++;
      }
    }

    // Rodapé fixo em cada página
    const pageCount = doc.getNumberOfPages();
    doc.setFontSize(8);
    for (let page = 1; page <= pageCount; page++) {
      doc.setPage(page);
      doc.text("Documento técnico de medições", doc.internal.pageSize.getWidth()/2, doc.internal.pageSize.getHeight()-10, { align: "center" });
    }

    saveBudgetHistory();

    // Gera nome do arquivo PDF
    const fileName = `Medicoes_${measurements[0].clientName||'cliente'}.pdf`;
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      // iOS/Safari: abre PDF em nova aba
      const pdfBlob = doc.output('blob');
      const pdfUrl = URL.createObjectURL(pdfBlob);
      window.open(pdfUrl, '_blank');
    } else {
      // Android/Outros: download
      doc.save(fileName);
    }

    measurements = [];
    clearForm();
    alert("PDF gerado com sucesso!");
  }

  // --- LocalStorage ---
  function saveClientData() {
    let clients = JSON.parse(localStorage.getItem("clientsHistory")) || [];
    const currentClient = {
      clientName: elements.clientName.value.trim(),
      clientAddress: elements.clientAddress.value.trim(),
      measurementDate: elements.measurementDate.value
    };
    if (currentClient.clientName && !clients.some(c => c.clientName === currentClient.clientName)) {
      clients.push(currentClient);
      localStorage.setItem("clientsHistory", JSON.stringify(clients));
    }
    loadClientList();
  }

  function loadClientList() {
    const clients = JSON.parse(localStorage.getItem("clientsHistory")) || [];
    elements.clientList.innerHTML = "";
    clients.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.clientName;
      elements.clientList.appendChild(opt);
    });
  }

  elements.clientName.addEventListener("change", function() {
    const clients = JSON.parse(localStorage.getItem("clientsHistory")) || [];
    const selected = clients.find(x => x.clientName === this.value);
    if (selected) {
      elements.clientAddress.value = selected.clientAddress;
      elements.measurementDate.value = selected.measurementDate;
    }
  });

  function saveBudgetHistory() {
    let budgetHistory = JSON.parse(localStorage.getItem("budgetsHistory")) || [];
    const newBudget = {
      timestamp: new Date().toISOString(),
      clientName: measurements[0].clientName,
      clientAddress: measurements[0].clientAddress,
      items: measurements
    };
    budgetHistory.push(newBudget);
    localStorage.setItem("budgetsHistory", JSON.stringify(budgetHistory));
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadClientList();
    if (!elements.measurementDate.value) {
      elements.measurementDate.value = new Date().toISOString().split('T')[0];
    }
    toggleBlindsFields(elements.blindsIncluded.value);
    updateImagePreview(elements.windowDesign.value);
  });
</script>
</body>
</html>
