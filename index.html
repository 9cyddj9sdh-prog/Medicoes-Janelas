<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medições Caixilharia</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; padding:15px; }
.container { background:white; padding:20px; border-radius:12px; max-width:650px; margin:auto; }
input, select, textarea { width:100%; padding:8px; margin:6px 0; }
label { font-weight:bold; }
.row { display:flex; gap:10px; }
.row > div { flex:1; }
.canvas-box { border:2px dashed #666; height:160px; display:flex; align-items:center; justify-content:center; margin:10px 0; }
button { padding:10px; margin:5px; border:none; border-radius:6px; color:white; }
button:nth-child(1){ background:#777; }
button:nth-child(2){ background:#007bff; }
button:nth-child(3){ background:#28a745; }
</style>
</head>

<body>
<div class="container">

<h2>Medições Caixilharia</h2>

<label>Cliente</label>
<input id="cliente">

<label>Morada</label>
<input id="morada">

<div class="row">
<div><label>Data</label><input type="date" id="data"></div>
<div><label>Material</label>
<select id="material"><option>Alumínio</option><option>PVC</option></select>
</div>
</div>

<hr>

<label>Código</label>
<input id="codigo">

<div class="row">
<div><label>Largura</label><input id="largura"></div>
<div><label>Altura</label><input id="altura"></div>
</div>

<label>Vão</label>
<select id="desenho" onchange="imgPreview.src=this.value+'.jpeg'">
<option value="Fixo">Fixo</option>
<option value="Janela1Folha">Janela 1 Folha</option>
<option value="JanelaAbrir2Folhas">Janela Abrir 2 Folhas</option>
<option value="JanelaCorrer">Janela Correr</option>
<option value="Porta">Porta</option>
</select>

<div class="canvas-box"><img id="imgPreview" style="max-height:100%"></div>

<label>Vidro</label>
<input id="vidro">

<label>Oscilo</label>
<select id="oscilo"><option>Sim</option><option>Não</option></select>

<label>Série</label>
<select id="serie">
<option>Série Térmica Abrir 70</option>
<option>Série Termica Abrir 84</option>
<option>Série Termica Correr 24200</option>
<option>Série Fria A40</option>
<option>Série Fria Europa</option>
<option>Série Fria Perimetral</option>
<option>Série de Correr B3</option>
<option>Série de Correr B1</option>
<option>Séries Específicas</option>
</select>

<label>OBS</label>
<textarea id="obs"></textarea>

<label>Remates</label>
<textarea id="remates"></textarea>

<hr>

<label>Estores</label>
<select id="estores"><option>Sim</option><option>Não</option></select>

<div class="row">
<div><label>Largura</label><input id="lEst"></div>
<div><label>Altura</label><input id="aEst"></div>
</div>

<label>Cor</label>
<input id="corEst">

<div style="display:flex; justify-content:space-around;">
<button onclick="limpar()">Limpar</button>
<button onclick="avancar()">Avançar</button>
<button onclick="finalizar()">Finalizar</button>
</div>

</div>

<script>
let base=[];

function limpar(){
["codigo","largura","altura","vidro","obs","remates","lEst","aEst","corEst"]
.forEach(id=>document.getElementById(id).value="");
}

function dados(){
return{
cliente:cliente.value,morada:morada.value,data:data.value,
codigo:codigo.value,largura:largura.value,altura:altura.value,
desenho:desenho.value,vidro:vidro.value,oscilo:oscilo.value,serie:serie.value,
obs:obs.value,remates:remates.value,
estores:estores.value,lEst:lEst.value,aEst:aEst.value,corEst:corEst.value
};
}

function avancar(){ base.push(dados()); limpar(); }

// 🔥 carregar imagem corretamente
function loadImage(src){
return new Promise(resolve=>{
let img=new Image();
img.crossOrigin="Anonymous";
img.onload=()=>resolve(img);
img.onerror=()=>resolve(null);
img.src=src;
});
}

async function finalizar(){

base.push(dados());

const { jsPDF }=window.jspdf;
let doc=new jsPDF();

let col=0,row=0;

for(let i=0;i<base.length;i++){

let d=base[i];

if(i%8===0 && i>0){ doc.addPage(); col=0; row=0; }

// CABEÇALHO
if(i%8===0){
doc.setFontSize(16);
doc.text("Medições Caixilharia",105,12,{align:"center"});

doc.setFontSize(10);
doc.text("Cliente: "+d.cliente,10,22);
doc.text("Morada: "+d.morada,10,28);
doc.text("Data: "+d.data,10,34);
}

// POSIÇÃO
let x=10+(col*95);
let y=38+(row*65);

// CAIXA
doc.setDrawColor(120);
doc.rect(x,y,90,60);

// TITULO
doc.setFontSize(10);
doc.text("VÃO "+(i+1),x+3,y+6);

// TEXTO
doc.setFontSize(8);

doc.text("Cod: "+(d.codigo||"-"),x+3,y+12);
doc.text("Vão: "+d.desenho,x+3,y+17);
doc.text("Vidro: "+(d.vidro||"-"),x+3,y+22);
doc.text("Osc: "+d.oscilo,x+3,y+27);
doc.text("Série: "+d.serie,x+3,y+32);

doc.text("L: "+d.largura+" mm",x+3,y+37);
doc.text("A: "+d.altura+" mm",x+3,y+41);

// TEXTO COM QUEBRA
let obs = doc.splitTextToSize("Obs: "+(d.obs||"-"), 42);
let rem = doc.splitTextToSize("Rem: "+(d.remates||"-"), 42);

doc.text(obs,x+3,y+46);
doc.text(rem,x+3,y+55);

// ESTORES
doc.text("Est: "+d.estores,x+48,y+40);
doc.text("L: "+d.lEst,x+48,y+45);
doc.text("A: "+d.aEst,x+48,y+50);
doc.text("Cor: "+d.corEst,x+48,y+55);

// 🔥 IMAGEM PROPORCIONAL
let image = await loadImage(d.desenho + ".jpeg");

if(image){

let maxW=32;
let maxH=26;

let ratio=image.width/image.height;

let w=maxW;
let h=maxW/ratio;

if(h>maxH){
h=maxH;
w=maxH*ratio;
}

let posX=x+48+(maxW-w)/2;
let posY=y+8+(maxH-h)/2;

doc.addImage(image,"JPEG",posX,posY,w,h);
}

// GRID
col++;
if(col===2){ col=0; row++; }

}

// RODAPÉ
doc.setFontSize(8);
doc.text("Documento gerado automaticamente",105,290,{align:"center"});

doc.save("orcamento.pdf");

base=[];
}
</script>

</body>
</html>
