<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medições Caixilharia</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; padding:15px; }
.container { background:white; padding:15px; border-radius:10px; max-width:600px; margin:auto; }
h2 { text-align:center; }
input, select, textarea { width:100%; padding:8px; margin:6px 0; }
.row { display:flex; gap:10px; }
.row > div { flex:1; }
.canvas-box { border:2px solid #333; height:150px; display:flex; align-items:center; justify-content:center; margin:10px 0; }
textarea { height:100px; resize:vertical; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>
<div class="container">
<h2>Medições Caixilharia</h2>

<label>Cliente</label>
<input type="text">

<label>Morada</label>
<input type="text">

<div class="row">
<div>
<label>Data</label>
<input type="date">
</div>
<div>
<label>Material</label>
<select>
<option>Alumínio</option>
<option>PVC</option>
</select>
</div>
</div>

<label>Série</label>
<select>
<option>Fria</option>
<option>Térmica</option>
</select>

<hr>

<label>Código</label>
<input type="text">

<label>Tipo</label>
<input type="text">

<div class="row">
<div>
<label>Largura</label>
<input type="number">
</div>
<div>
<label>Altura</label>
<input type="number">
</div>
</div>

<label><b>Vão</b></label>
<select id="desenho" onchange="mudarImagem()">
<option value="Fixo">Fixo</option>
<option value="Janela1Folha">Janela 1 Folha</option>
<option value="JanelaAbrir2Folhas">Janela Abrir 2 Folhas</option>
<option value="JanelaCorrer">Janela Correr</option>
<option value="Porta">Porta</option>
</select>

<div class="canvas-box">
<img id="imgPreview" style="max-height:100%;">
</div>

<hr>

<label>Soleira de Ressoamento</label>
<select>
<option>Sim</option>
<option>Não</option>
</select>

<label>OBS</label>
<textarea></textarea>

<label>Remates</label>
<textarea></textarea>

<div style="display:flex; justify-content:space-around;">
<button onclick="limpar()">Limpar</button>
<button onclick="avancar()">Avançar</button>
<button onclick="finalizar()">Finalizar</button>
</div>

</div>

<script>
let base = JSON.parse(localStorage.getItem("base_janelas")) || [];

function mudarImagem(){
  let val = document.getElementById("desenho").value;
  document.getElementById("imgPreview").src = val + ".jpeg";
}

function limpar(){
  document.querySelectorAll("input, textarea").forEach(el => el.value = "");
}

function getDados(){
  let inputs = document.querySelectorAll("input");
  let textareas = document.querySelectorAll("textarea");
  let selects = document.querySelectorAll("select");

  return {
    cliente: inputs[0]?.value || "",
    morada: inputs[1]?.value || "",
    data: inputs[2]?.value || "",
    codigo: inputs[3]?.value || "",
    tipo: inputs[4]?.value || "",
    largura: inputs[5]?.value || "",
    altura: inputs[6]?.value || "",
    desenho: selects[2]?.value || "",
    obs: textareas[0]?.value || "",
    remates: textareas[1]?.value || ""
  };
}

function avancar(){
  base.push(getDados());
  localStorage.setItem("base_janelas", JSON.stringify(base));

  let inputs = document.querySelectorAll("input");
  let textareas = document.querySelectorAll("textarea");

  for(let i = 3; i < inputs.length; i++){
    inputs[i].value = "";
  }
  textareas.forEach(t => t.value = "");
}

// 🔥 FUNÇÃO PDF OTIMIZADA
async function finalizar(){

  let atual = getDados();
  if(atual.codigo || atual.tipo || atual.largura){
    base.push(atual);
  }

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  const margem = 10;
  const larguraPagina = 210;

  const colunas = 2;
  const linhas = 4;

  const larguraBox = (larguraPagina - (margem*2)) / colunas;
  const alturaBox = (297 - 50) / linhas;

  let x = margem;
  let y = 40;
  let contador = 0;

  for(let i=0;i<base.length;i++){

    let d = base[i];

    if(contador === colunas * linhas){
      doc.addPage();
      contador = 0;
      x = margem;
      y = 40;
    }

    if(contador === 0){
      doc.setFontSize(14);
      doc.text("Medições Caixilharia", larguraPagina/2, 15, {align:"center"});

      doc.setFontSize(9);
      doc.text("Cliente: " + d.cliente, margem, 25);
      doc.text("Morada: " + d.morada, margem, 30);
      doc.text("Data: " + d.data, margem, 35);
    }

    // caixa
    doc.rect(x, y, larguraBox-3, alturaBox-3);

    // título vão
    doc.setFontSize(9);
    doc.text("VÃO " + String(i+1).padStart(2,'0'), x+2, y+6);

    doc.setFontSize(8);
    doc.text("Cod: " + d.codigo, x+2, y+10);
    doc.text("Tipo: " + d.tipo, x+2, y+14);
    doc.text("Vão: " + d.desenho, x+2, y+18);

    doc.text("L: " + d.largura + " mm", x+2, y+24);
    doc.text("A: " + d.altura + " mm", x+2, y+28);

    // texto limitado (não rebenta layout)
    let obs = doc.splitTextToSize("OBS: " + (d.obs || "-"), larguraBox-6);
    let rem = doc.splitTextToSize("Rem: " + (d.remates || "-"), larguraBox-6);

    doc.text(obs.slice(0,2), x+2, y+34);   // max 2 linhas
    doc.text(rem.slice(0,2), x+2, y+44);   // max 2 linhas

    // imagem reduzida
    let img = new Image();
    img.src = d.desenho + ".jpeg";

    await new Promise(resolve => {
      img.onload = function(){
        doc.addImage(img, 'JPEG', x + larguraBox - 28, y+6, 24, 24);
        resolve();
      }
      img.onerror = resolve;
    });

    contador++;

    if(contador % colunas === 0){
      x = margem;
      y += alturaBox;
    } else {
      x += larguraBox;
    }
  }

  doc.save("orcamento_profissional.pdf");

  localStorage.removeItem("base_janelas");
  base = [];
}

mudarImagem();
</script>

</body>
</html>
