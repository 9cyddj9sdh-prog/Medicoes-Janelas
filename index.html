<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medições Caixilharia</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; padding:15px; }
.container { background:white; padding:20px; border-radius:12px; max-width:650px; margin:auto; }
input, select, textarea { width:100%; padding:8px; margin:6px 0; }
label { font-weight:bold; }
.row { display:flex; gap:10px; }
.row > div { flex:1; }
.canvas-box { border:2px dashed #666; height:160px; display:flex; align-items:center; justify-content:center; margin:10px 0; }
button { padding:10px; margin:5px; border:none; border-radius:6px; color:white; }
button:nth-child(1){ background:#777; }
button:nth-child(2){ background:#007bff; }
button:nth-child(3){ background:#28a745; }
</style>
</head>

<body>
<div class="container">

<h2>Medições Caixilharia</h2>

<label>Cliente</label>
<input id="cliente" list="listaClientes">
<datalist id="listaClientes"></datalist>

<label>Morada</label>
<input id="morada">

<div class="row">
<div><label>Data</label><input type="date" id="data"></div>
<div><label>Material</label>
<select id="material"><option>Alumínio</option><option>PVC</option></select>
</div>
</div>

<hr>

<label>Código</label>
<input id="codigo">

<div class="row">
<div>
<label>Largura</label>
<input id="largura" oninput="soNumeros(this)">
</div>
<div>
<label>Altura</label>
<input id="altura" oninput="soNumeros(this)">
</div>
</div>

<label>Vão</label>

<select id="desenho" onchange="imgPreview.src=this.value">

<option value="JanelaAbrir1Folha.PNG">
Janela Abrir 1 Folha
</option>

<option value="JanelaAbrir2Folhas.PNG">
Janela Abrir 2 Folhas
</option>

<option value="Basculante.jpg">
Basculante
</option>

<option value="JanelaCorrer2Folhas.PNG">
Janela de Correr 2 Folhas
</option>

<option value="JanelaCorrer3Folhas.JPG">
Janela de Correr 3 Folhas
</option>

<option value="PortaJanela1Folha.jpg">
Porta Janela 1 Folha
</option>

<option value="PortaJanela2Folhas.PNG">
Porta Janela 2 Folhas
</option>

<option value="PortaPainel.JPG">
Porta Painel
</option>

<option value="PortaPainelFixo.JPG">
Porta Painel com Fixo
</option>

<option value="PortaVidro.PNG">
Porta Vidro
</option>

<option value="PortaComFixoVidro.jpg">
Porta Vidro com Fixo
</option>

<option value="Fixo.jpg">
Fixo Vertical
</option>

<option value="FixoHorizontal.PNG">
Fixo Horizontal
</option>

</select>

<div class="canvas-box" style="flex-direction:column;">

<img id="imgPreview" style="max-height:120px; transition:0.3s;">

<button 
type="button"
onclick="inverterImagem()" 
style="
margin-top:5px;
padding:4px 8px;
font-size:12px;
background:#444;
color:white;
border:none;
border-radius:5px;
width:auto;
">
Inverter
</button>

<div style="
font-size:11px;
margin-top:4px;
color:#555;
">
Todas as vistas são por dentro
</div>

</div>

<label>Vidro / Painel</label>
<input id="vidro">

<label>Oscilo</label>
<select id="oscilo"><option>Sim</option><option>Não</option></select>

<label>Série MAT</label>

<select id="serie">

<option>Térmica 70</option>

<option>Térmica 84</option>

<option>Térmica Correr</option>

<option>A40</option>

<option>Série Europa</option>

<option>Perimetral 45</option>

<option>Perimetral 65</option>

<option>B3</option>

<option>Séries Específicas</option>

</select>

<label>OBS</label>
<textarea id="obs"></textarea>

<label>Remates</label>
<textarea id="remates"></textarea>

<hr>

<label>Estores</label>
<select id="estores"><option>Sim</option><option>Não</option></select>

<div class="row">
<div>
<label>Largura</label>
<input id="lEst" oninput="soNumeros(this)">
</div>
<div>
<label>Altura</label>
<input id="aEst" oninput="soNumeros(this)">
</div>
</div>

<label>Cor</label>
<input id="corEst">

<div style="display:flex; justify-content:space-around;">
<button onclick="limpar()">Limpar</button>
<button onclick="avancar()">Avançar</button>
<button onclick="finalizar()">Finalizar</button>
</div>

</div>

<script>
let base=[];

let invertida = false;

function inverterImagem(){

invertida = !invertida;

let img = document.getElementById("imgPreview");

if(invertida){
img.style.transform = "scaleX(-1)";
}else{
img.style.transform = "scaleX(1)";
}
}

function inverterBase64(base64){

return new Promise(resolve=>{

let img = new Image();

img.onload = function(){

let canvas = document.createElement("canvas");
canvas.width = this.width;
canvas.height = this.height;

let ctx = canvas.getContext("2d");

// inverter horizontal
ctx.translate(canvas.width,0);
ctx.scale(-1,1);

ctx.drawImage(this,0,0);

resolve(canvas.toDataURL("image/jpeg"));
};

img.src = base64;

});

}
  
function limpar(){
["codigo","largura","altura","vidro","obs","remates","lEst","aEst","corEst"]
.forEach(id=>document.getElementById(id).value="");
}

function dados(){
return{
cliente:cliente.value,morada:morada.value,data:data.value,
codigo:codigo.value,largura:largura.value,altura:altura.value,
desenho:desenho.value,vidro:vidro.value,oscilo:oscilo.value,serie:serie.value,
obs:obs.value,remates:remates.value,
estores:estores.value,lEst:lEst.value,aEst:aEst.value,corEst:corEst.value,
invertida:invertida
};
}

// 🔥 converter imagem para base64
function getImagemBase64(nome){
  return new Promise(resolve=>{
    let img=new Image();
    img.crossOrigin="Anonymous";
    img.onload=function(){
      let canvas=document.createElement("canvas");
      canvas.width=this.width;
      canvas.height=this.height;
      canvas.getContext("2d").drawImage(this,0,0);
      resolve(canvas.toDataURL("image/jpeg"));
    };
    img.onerror=()=>resolve(null);
    img.src=nome;
  });
}

async function avancar(){

let d=dados();
d.imagem = await getImagemBase64(d.desenho);

// inverter REALMENTE a imagem
if(invertida){
d.imagem = await inverterBase64(d.imagem);
}

base.push(d);

guardarCliente();
limpar();

alert("Janela guardada");
}

function soNumeros(el){
el.value=el.value.replace(/[^0-9]/g,'');
}

async function finalizar(){

if(base.length===0){
alert("Sem dados");
return;
}

if(codigo.value || largura.value || altura.value){
let d = dados();
d.imagem = await getImagemBase64(d.desenho);

if(invertida){
d.imagem = await inverterBase64(d.imagem);
}

base.push(d);
}

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let col = 0;
let row = 0;

// 🔥 6 por página (2x3)
const boxW = 90;
const boxH = 80;

for(let i=0;i<base.length;i++){

let d = base[i];

// nova página
if(i%6===0 && i>0){
doc.addPage();
col = 0;
row = 0;
}

// CABEÇALHO LIMPO
if(i%6===0){

doc.setFontSize(14);
doc.setFont(undefined,"bold");
doc.text("Medições Caixilharia",105,12,{align:"center"});

doc.setFont(undefined,"normal");
doc.setFontSize(9);

doc.text("Cliente: "+(d.cliente||"-"),10,22);
doc.text("Morada: "+(d.morada||"-"),10,28);
doc.text("Data: "+(d.data||"-"),10,34);

doc.setDrawColor(180);
doc.line(10,37,200,37);
}

// posição
let x = 10 + (col * 95);
let y = 40 + (row * 85);

// caixa
doc.setDrawColor(150);
doc.rect(x,y,boxW,boxH);

// título
doc.setFontSize(10);
doc.setFont(undefined,"bold");
doc.text("VÃO "+(i+1), x+3, y+6);

doc.setFont(undefined,"normal");
doc.setFontSize(8);

// esquerda
doc.text("Cod: "+(d.codigo||"-"), x+3, y+12);
doc.text("Vão: "+d.desenho, x+3, y+17);
doc.text("Vidro: "+(d.vidro||"-"), x+3, y+22);
doc.text("Osc: "+d.oscilo, x+3, y+27);
doc.text("Série: "+d.serie, x+3, y+32);

doc.text("L: "+d.largura+" mm", x+3, y+37);
doc.text("A: "+d.altura+" mm", x+3, y+42);

// OBS
let obs = doc.splitTextToSize("Obs: "+(d.obs||"-"), 45);
doc.text(obs.slice(0,3), x+3, y+50);

// REMATES
let rem = doc.splitTextToSize("Remates: "+(d.remates||"-"), 45);
doc.text(rem.slice(0,2), x+3, y+65);

// direita (imagem + estores)

// imagem
// imagem
if(d.imagem){

let img = new Image();
img.src = d.imagem;

let maxW = 30;
let maxH = 25;

let ratio = img.width / img.height;

let w = maxW;
let h = maxW / ratio;

if(h > maxH){
h = maxH;
w = maxH * ratio;
}

// imagem
let formato = "JPEG";

if(d.desenho.toLowerCase().includes(".png")){
formato = "PNG";
}

doc.addImage(
d.imagem,
formato,
x+50,
y+10,
w,
h
);

// texto pequeno por baixo da imagem
doc.setFontSize(6);

doc.text(
"Todas as vistas são por dentro",
x+50,
y + 10 + h + 3
);

doc.setFontSize(8);

}
// estores
doc.text("Estores: "+d.estores, x+50, y+42);
doc.text("L: "+(d.lEst||"-"), x+50, y+45);
doc.text("A: "+(d.aEst||"-"), x+50, y+50);
doc.text("Cor: "+(d.corEst||"-"), x+50, y+55);

// grid
col++;
if(col===2){
col=0;
row++;
}
}

// rodapé simples
doc.setFontSize(8);
doc.text("Documento técnico de medições",105,290,{align:"center"});

guardarOrcamento();
  
let nomeCliente = (base[0].cliente || "Cliente")
.replace(/\s+/g,'_')
.replace(/[^a-zA-Z0-9_]/g,'');

doc.save("Orcamento_"+nomeCliente+".pdf");
base=[];
}


  function guardarOrcamento(){

let historico = JSON.parse(localStorage.getItem("orcamentos")) || [];

let novo = {
data: new Date().toISOString(),
cliente: base[0].cliente,
morada: base[0].morada,
registos: base
};

historico.push(novo);

localStorage.setItem("orcamentos", JSON.stringify(historico));
}
// HISTÓRICO
function guardarCliente(){
let lista=JSON.parse(localStorage.getItem("clientes"))||[];
let novo={cliente:cliente.value,morada:morada.value,data:data.value};

if(novo.cliente && !lista.some(c=>c.cliente===novo.cliente)){
lista.push(novo);
localStorage.setItem("clientes",JSON.stringify(lista));
}
carregarClientes();
}

function carregarClientes(){
let lista=JSON.parse(localStorage.getItem("clientes"))||[];
let datalist=document.getElementById("listaClientes");
datalist.innerHTML="";
lista.forEach(c=>{
let option=document.createElement("option");
option.value=c.cliente;
datalist.appendChild(option);
});
}

cliente.addEventListener("change",function(){
let lista=JSON.parse(localStorage.getItem("clientes"))||[];
let c=lista.find(x=>x.cliente===this.value);
if(c){ morada.value=c.morada; data.value=c.data; }
});

carregarClientes();
</script>

</body>
</html>
