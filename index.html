<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medições Caixilharia</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; padding:15px; }
.container { background:white; padding:20px; border-radius:12px; max-width:650px; margin:auto; }
input, select, textarea { width:100%; padding:8px; margin:6px 0; }
label { font-weight:bold; }
.row { display:flex; gap:10px; }
.row > div { flex:1; }
.canvas-box { border:2px dashed #666; height:160px; display:flex; align-items:center; justify-content:center; margin:10px 0; }
button { padding:10px; margin:5px; border:none; border-radius:6px; color:white; }
button:nth-child(1){ background:#777; }
button:nth-child(2){ background:#007bff; }
button:nth-child(3){ background:#28a745; }
</style>
</head>

<body>
<div class="container">

<h2>Medições Caixilharia</h2>

<label>Cliente</label>
<input id="cliente" list="listaClientes">
<datalist id="listaClientes"></datalist>

<label>Morada</label>
<input id="morada">

<div class="row">
<div><label>Data</label><input type="date" id="data"></div>
<div><label>Material</label>
<select id="material"><option>Alumínio</option><option>PVC</option></select>
</div>
</div>

<hr>

<label>Código</label>
<input id="codigo">

<div class="row">
<div>
<label>Largura</label>
<input id="largura" oninput="soNumeros(this)">
</div>
<div>
<label>Altura</label>
<input id="altura" oninput="soNumeros(this)">
</div>
</div>

<label>Vão</label>
<select id="desenho" onchange="imgPreview.src=this.value+'.jpeg'">
<option value="Fixo">Fixo</option>
<option value="Janela1Folha">Janela 1 Folha</option>
<option value="JanelaAbrir2Folhas">Janela Abrir 2 Folhas</option>
<option value="JanelaCorrer">Janela Correr</option>
<option value="Porta">Porta</option>
</select>

<div class="canvas-box"><img id="imgPreview" style="max-height:100%"></div>

<label>Vidro</label>
<input id="vidro">

<label>Oscilo</label>
<select id="oscilo"><option>Sim</option><option>Não</option></select>

<label>Série</label>
<select id="serie">
<option>Série Térmica Abrir 70</option>
<option>Série Termica Abrir 84</option>
<option>Série Termica Correr 24200</option>
<option>Série Fria A40</option>
<option>Série Fria Europa</option>
<option>Série Fria Perimetral</option>
<option>Série de Correr B3</option>
<option>Série de Correr B1</option>
<option>Séries Específicas</option>
</select>

<label>OBS</label>
<textarea id="obs"></textarea>

<label>Remates</label>
<textarea id="remates"></textarea>

<hr>

<label>Estores</label>
<select id="estores"><option>Sim</option><option>Não</option></select>

<div class="row">
<div>
<label>Largura</label>
<input id="lEst" oninput="soNumeros(this)">
</div>
<div>
<label>Altura</label>
<input id="aEst" oninput="soNumeros(this)">
</div>
</div>

<label>Cor</label>
<input id="corEst">

<div style="display:flex; justify-content:space-around;">
<button onclick="limpar()">Limpar</button>
<button onclick="avancar()">Avançar</button>
<button onclick="finalizar()">Finalizar</button>
</div>

</div>

<script>
let base=[];

function limpar(){
["codigo","largura","altura","vidro","obs","remates","lEst","aEst","corEst"]
.forEach(id=>document.getElementById(id).value="");
}

function dados(){
return{
cliente:cliente.value,morada:morada.value,data:data.value,
codigo:codigo.value,largura:largura.value,altura:altura.value,
desenho:desenho.value,vidro:vidro.value,oscilo:oscilo.value,serie:serie.value,
obs:obs.value,remates:remates.value,
estores:estores.value,lEst:lEst.value,aEst:aEst.value,corEst:corEst.value
};
}

// 🔥 converter imagem para base64
function getImagemBase64(nome){
  return new Promise(resolve=>{
    let img=new Image();
    img.crossOrigin="Anonymous";
    img.onload=function(){
      let canvas=document.createElement("canvas");
      canvas.width=this.width;
      canvas.height=this.height;
      canvas.getContext("2d").drawImage(this,0,0);
      resolve(canvas.toDataURL("image/jpeg"));
    };
    img.onerror=()=>resolve(null);
    img.src=nome+".jpeg";
  });
}

async function avancar(){

let d=dados();
d.imagem=await getImagemBase64(d.desenho);

base.push(d);

guardarCliente();
limpar();

alert("Janela guardada");
}

function soNumeros(el){
el.value=el.value.replace(/[^0-9]/g,'');
}

async function finalizar(){

if(base.length===0){
alert("Sem dados");
return;
}

const { jsPDF }=window.jspdf;
let doc=new jsPDF();

let col=0,row=0;

for(let i=0;i<base.length;i++){

let d=base[i];

if(i%8===0 && i>0){ doc.addPage(); col=0; row=0; }

if(i%8===0){
doc.setFontSize(14);
doc.text("Medições Caixilharia",105,12,{align:"center"});
doc.setFontSize(9);
doc.text("Cliente: "+d.cliente,10,22);
doc.text("Morada: "+d.morada,10,28);
doc.text("Data: "+d.data,10,34);
doc.line(10,37,200,37);
}

let x=10+(col*95);
let y=40+(row*65);

doc.rect(x,y,90,60);

doc.setFontSize(9);
doc.text("VÃO "+(i+1),x+3,y+6);

doc.setFontSize(8);

doc.text("Cod: "+(d.codigo||"-"),x+3,y+12);
doc.text("Vão: "+d.desenho,x+3,y+17);
doc.text("Vidro: "+(d.vidro||"-"),x+3,y+22);
doc.text("Osc: "+d.oscilo,x+3,y+27);
doc.text("Série: "+d.serie,x+3,y+32);

doc.text("L: "+d.largura+" mm",x+3,y+37);
doc.text("A: "+d.altura+" mm",x+3,y+42);

let obs=doc.splitTextToSize("Obs: "+(d.obs||"-"),42);
let rem=doc.splitTextToSize("Rem: "+(d.remates||"-"),42);

doc.text(obs.slice(0,2),x+3,y+48);
doc.text(rem.slice(0,2),x+3,y+56);

doc.text("Est: "+d.estores,x+48,y+40);
doc.text("L: "+(d.lEst||"-"),x+48,y+45);
doc.text("A: "+(d.aEst||"-"),x+48,y+50);
doc.text("Cor: "+(d.corEst||"-"),x+48,y+55);

// 🔥 imagem correta por vão
if(d.imagem){
doc.addImage(d.imagem,"JPEG",x+48,y+8,30,25);
}

col++;
if(col===2){ col=0; row++; }

}

doc.save("orcamento_profissional.pdf");
base=[];
}

// HISTÓRICO
function guardarCliente(){
let lista=JSON.parse(localStorage.getItem("clientes"))||[];
let novo={cliente:cliente.value,morada:morada.value,data:data.value};

if(novo.cliente && !lista.some(c=>c.cliente===novo.cliente)){
lista.push(novo);
localStorage.setItem("clientes",JSON.stringify(lista));
}
carregarClientes();
}

function carregarClientes(){
let lista=JSON.parse(localStorage.getItem("clientes"))||[];
let datalist=document.getElementById("listaClientes");
datalist.innerHTML="";
lista.forEach(c=>{
let option=document.createElement("option");
option.value=c.cliente;
datalist.appendChild(option);
});
}

cliente.addEventListener("change",function(){
let lista=JSON.parse(localStorage.getItem("clientes"))||[];
let c=lista.find(x=>x.cliente===this.value);
if(c){ morada.value=c.morada; data.value=c.data; }
});

carregarClientes();
</script>

</body>
</html>
