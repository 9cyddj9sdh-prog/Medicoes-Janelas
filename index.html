<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medições Caixilharia</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; padding:15px; }
.container { background:white; padding:20px; border-radius:12px; max-width:650px; margin:auto; }
input, select, textarea { width:100%; padding:8px; margin:6px 0; }
label { font-weight:bold; }
.row { display:flex; gap:10px; }
.row > div { flex:1; }
.canvas-box { border:2px dashed #666; height:160px; display:flex; align-items:center; justify-content:center; margin:10px 0; }
button { padding:10px; margin:5px; border:none; border-radius:6px; color:white; }
button:nth-child(1){ background:#777; }
button:nth-child(2){ background:#007bff; }
button:nth-child(3){ background:#28a745; }
</style>
</head>

<body>
<div class="container">

<h2>Medições Caixilharia</h2>

<label>Cliente</label>
<input id="cliente" list="listaClientes">
<datalist id="listaClientes"></datalist>

<label>Morada</label>
<input id="morada">

<div class="row">
<div><label>Data</label><input type="date" id="data"></div>
<div><label>Material</label>
<select id="material"><option>Alumínio</option><option>PVC</option></select>
</div>
</div>

<hr>

<label>Código</label>
<input id="codigo">

<div class="row">
<div><label>Largura</label>
<input id="largura" oninput="soNumeros(this)">
<div><label>Altura</label>
<input id="altura" oninput="soNumeros(this)">

<label>Vão</label>
<select id="desenho" onchange="imgPreview.src=this.value+'.jpeg'">
<option value="Fixo">Fixo</option>
<option value="Janela1Folha">Janela 1 Folha</option>
<option value="JanelaAbrir2Folhas">Janela Abrir 2 Folhas</option>
<option value="JanelaCorrer">Janela Correr</option>
<option value="Porta">Porta</option>
</select>

<div class="canvas-box"><img id="imgPreview" style="max-height:100%"></div>

<label>Vidro</label>
<input id="vidro">

<label>Oscilo</label>
<select id="oscilo"><option>Sim</option><option>Não</option></select>

<label>Série</label>
<select id="serie">
<option>Série Térmica Abrir 70</option>
<option>Série Termica Abrir 84</option>
<option>Série Termica Correr 24200</option>
<option>Série Fria A40</option>
<option>Série Fria Europa</option>
<option>Série Fria Perimetral</option>
<option>Série de Correr B3</option>
<option>Série de Correr B1</option>
<option>Séries Específicas</option>
</select>

<label>OBS</label>
<textarea id="obs"></textarea>

<label>Remates</label>
<textarea id="remates"></textarea>

<hr>

<label>Estores</label>
<select id="estores"><option>Sim</option><option>Não</option></select>

<div class="row">
<div><label>Largura</label>
<input id="largura" oninput="soNumeros(this)">
<div><label>Altura</label>
<input id="altura" oninput="soNumeros(this)">
<label>Cor</label>
<input id="corEst">

<div style="display:flex; justify-content:space-around;">
<button onclick="limpar()">Limpar</button>
<button onclick="avancar()">Avançar</button>
<button onclick="finalizar()">Finalizar</button>
</div>

</div>

<script>
let base=[];

function limpar(){
["codigo","largura","altura","vidro","obs","remates","lEst","aEst","corEst"]
.forEach(id=>document.getElementById(id).value="");
}

function dados(){
return{
cliente:cliente.value,morada:morada.value,data:data.value,
codigo:codigo.value,largura:largura.value,altura:altura.value,
desenho:desenho.value,vidro:vidro.value,oscilo:oscilo.value,serie:serie.value,
obs:obs.value,remates:remates.value,
estores:estores.value,lEst:lEst.value,aEst:aEst.value,corEst:corEst.value
};
}

function avancar(){
  base.push(dados());
  guardarCliente();
  limpar();
}

// 🔥 carregar imagem corretamente
function loadImage(src){
return new Promise(resolve=>{
let img=new Image();
img.crossOrigin="Anonymous";
img.onload=()=>resolve(img);
img.onerror=()=>resolve(null);
img.src=src;
});
}

async function finalizar(){

base.push(dados());

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

const margem = 10;
const boxW = 90;
const boxH = 65;

let col = 0;
let row = 0;

// carregar imagem corretamente
function loadImage(src){
  return new Promise(resolve=>{
    let img = new Image();
    img.crossOrigin = "Anonymous";
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

for(let i=0;i<base.length;i++){

let d = base[i];

// nova página
if(i%8===0 && i>0){
  doc.addPage();
  col = 0;
  row = 0;
}

// CABEÇALHO PROFISSIONAL
if(i%8===0){

doc.setFontSize(16);
doc.setFont(undefined, "bold");
doc.text("Medições Caixilharia",105,12,{align:"center"});

doc.setFontSize(10);
doc.setFont(undefined, "normal");

doc.text("Cliente:",10,22);
doc.text(d.cliente || "-",35,22);

doc.text("Morada:",10,28);
doc.text(d.morada || "-",35,28);

doc.text("Data:",10,34);
doc.text(d.data || "-",35,34);

// linha separadora
doc.setDrawColor(180);
doc.line(10,37,200,37);
}

// POSIÇÃO GRID
let x = margem + col*(boxW+5);
let y = 40 + row*(boxH+5);

// CAIXA
doc.setDrawColor(150);
doc.rect(x,y,boxW,boxH);

// TÍTULO
doc.setFontSize(10);
doc.setFont(undefined,"bold");
doc.text("VÃO " + String(i+1).padStart(2,'0'), x+3, y+6);

doc.setFont(undefined,"normal");
doc.setFontSize(8);

// COLUNA ESQUERDA
doc.text("Cod:", x+3, y+12);
doc.text(d.codigo || "-", x+18, y+12);

doc.text("Vão:", x+3, y+17);
doc.text(d.desenho, x+18, y+17);

doc.text("Vidro:", x+3, y+22);
doc.text(d.vidro || "-", x+18, y+22);

doc.text("Osc:", x+3, y+27);
doc.text(d.oscilo, x+18, y+27);

doc.text("Série:", x+3, y+32);
doc.text(d.serie, x+18, y+32);

doc.text("L:", x+3, y+37);
doc.text(d.largura + " mm", x+18, y+37);

doc.text("A:", x+3, y+42);
doc.text(d.altura + " mm", x+18, y+42);

// OBS + REMATES com quebra controlada
let obs = doc.splitTextToSize("Obs: " + (d.obs || "-"), 42);
let rem = doc.splitTextToSize("Rem: " + (d.remates || "-"), 42);

doc.text(obs.slice(0,2), x+3, y+48);
doc.text(rem.slice(0,2), x+3, y+56);

// COLUNA DIREITA (ESTORES)
doc.setFontSize(8);

doc.text("Estores:", x+48, y+37);
doc.text(d.estores, x+70, y+37);

doc.text("L:", x+48, y+42);
doc.text(d.lEst || "-", x+55, y+42);

doc.text("A:", x+48, y+47);
doc.text(d.aEst || "-", x+55, y+47);

doc.text("Cor:", x+48, y+52);
doc.text(d.corEst || "-", x+60, y+52);

// 🔥 IMAGEM PROPORCIONAL CORRETA
let image = await loadImage(d.desenho + ".jpeg");

if(image){

let maxW = 32;
let maxH = 26;

let ratio = image.width / image.height;

let w = maxW;
let h = maxW / ratio;

if(h > maxH){
  h = maxH;
  w = maxH * ratio;
}

// centralizar
let posX = x + 48 + (maxW - w)/2;
let posY = y + 8 + (maxH - h)/2;

doc.addImage(image,"JPEG",posX,posY,w,h);
}

// GRID
col++;
if(col===2){
  col=0;
  row++;
}
}

// RODAPÉ PROFISSIONAL
doc.setDrawColor(200);
doc.line(10,285,200,285);

doc.setFontSize(8);
doc.text("Documento técnico de medições",105,290,{align:"center"});

doc.save("orcamento_profissional.pdf");

base=[];
}

  function soNumeros(el){
  el.value = el.value.replace(/[^0-9]/g, '');
}
  // =============================
// HISTÓRICO DE CLIENTES
// =============================

// guardar cliente automaticamente
function guardarCliente(){

  let lista = JSON.parse(localStorage.getItem("clientes")) || [];

  let novo = {
    cliente: document.getElementById("cliente").value,
    morada: document.getElementById("morada").value,
    data: document.getElementById("data").value
  };

  // evitar duplicados
  if(novo.cliente && !lista.some(c => c.cliente === novo.cliente)){
    lista.push(novo);
    localStorage.setItem("clientes", JSON.stringify(lista));
  }

  carregarClientes();
}

// carregar lista para sugestões
function carregarClientes(){

  let lista = JSON.parse(localStorage.getItem("clientes")) || [];
  let datalist = document.getElementById("listaClientes");

  datalist.innerHTML = "";

  lista.forEach(c=>{
    let option = document.createElement("option");
    option.value = c.cliente;
    datalist.appendChild(option);
  });
}

// auto-preencher cliente
document.getElementById("cliente").addEventListener("change", function(){

  let lista = JSON.parse(localStorage.getItem("clientes")) || [];
  let encontrado = lista.find(c => c.cliente === this.value);

  if(encontrado){
    document.getElementById("morada").value = encontrado.morada;
    document.getElementById("data").value = encontrado.data;
  }
});

// iniciar ao abrir
carregarClientes();
</script>

</body>
</html>
